name: Deploy API to Azure App Service (AOT)on:    workflow_dispatch:jobs:    build:        runs-on: ubuntu-latest        steps:            - uses: actions/checkout@v3            - name: Setup .NET              uses: actions/setup-dotnet@v3              with:                  dotnet-version: "10.0.x"            - name: Install Native AOT Dependencies              run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev            - name: Publish API (Native AOT)              run: dotnet publish src/Presentation/AHS.Gateway.API/AHS.Gateway.API.csproj -c Release -r linux-x64 --self-contained true /p:PublishAot=true -o ./publish            - name: Upload artifact for deployment job              uses: actions/upload-artifact@v3              with:                  name: api-app                  path: ./publish    deploy:        runs-on: ubuntu-latest        needs: build        environment:            name: "production"            url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}        steps:            - name: Download artifact from build job              uses: actions/download-artifact@v3              with:                  name: api-app            - name: "Deploy to Azure Web App"              id: deploy-to-webapp              uses: azure/webapps-deploy@v2              with:                  app-name: "ahs-api-free"                  slot-name: "production"                  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}                  package: .