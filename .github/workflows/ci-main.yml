name: AHS.SaaS Core Pipelinerun-name: CI Build - ${{ github.event.head_commit.message }} by @${{ github.actor }}on:  push:    branches: [main]  pull_request:    branches: [main]env:  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true  DOTNET_NOLOGO: true  DOTNET_ROOT: /usr/share/dotnetjobs:  build-and-test:    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v4      - name: Setup .NET        uses: actions/setup-dotnet@v4        with:          dotnet-version: "10.0.102"          dotnet-quality: "preview"      - name: Install Blazor WebAssembly Tools        run: dotnet workload install wasm-tools      - name: Install Native AOT Dependencies        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev      - name: Restore        run: dotnet restore AHS.SaaS.slnx      - name: Build        run: dotnet build AHS.SaaS.slnx -c Release --no-restore      - name: AOT Publish Check        run: dotnet publish src/Presentation/AHS.Gateway.API/AHS.Gateway.API.csproj -c Release -r linux-x64